<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class=" mx-auto bg-white shadow-md p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Registro de usuarios</h2>
        <p class="mb-6">Estado: <span id="user-email" class="text-blue-600 font-semibold">Invitado</span></p>

        
        <form id="registerForm" class="mb-8">
            
            <label class="block text-sm mb-2">Nombre:</label>
            <input type="text" id="nombre" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
            
            
            
                <label class="block text-sm font-medium mb-2">Correo:</label>
                <input type="email" id="email" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
            

            
                <label class="block text-sm font-medium mb-2">Contraseña:</label>
                <input type="password" id="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
            

            
                <label class="block text-sm font-medium mb-2">Descripción:</label>
                <textarea id="descripcion" rows="3" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            

            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">
                Registrarse
            </button>
        </form>

        <div class="mb-6">
            <a href="index.html" class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600">Login</a>
            <button id="logout" class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600">Salir</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse border border-gray-300">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border border-gray-300 p-3">Nombre</th>
                        <th class="border border-gray-300 p-3">Email</th>
                        <th class="border border-gray-300 p-3">Descripción</th>
                        <th class="border border-gray-300 p-3">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    
                </tbody>
            </table>
        </div>
    </div>

    <script src="scripts.js"></script>
        
</body>
</html>
